name: Daily Stock Fetch

on:
  schedule:
 # 建議設定 UTC 07:12 (台灣時間 15:12)
    # 避開 07:00 或 07:30 這種熱門大塞車時段
    - cron: '12 7 * * 1-5'
  workflow_dispatch:      # 讓你可以手動點擊執行測試

permissions:
  contents: write         # 允許 Action 推播 data.json 回倉庫

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 消除 Node.js 20 棄用警告

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          # 💡 重要：將你設定的 Secrets 傳遞給 fetch.py 使用
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python fetch.py

      - name: Commit & push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "自動更新今日籌碼: $(date +'%Y-%m-%d')" || exit 0
          git push
