name: Daily Stock Fetch

on:
schedule:
    # 台灣時間 15:10 (嘗試第一次)
    - cron: '10 7 * * 1-5'
    # 台灣時間 15:40 (如果前一個還沒跑，這是一個補丁)
    - cron: '40 7 * * 1-5'
    # 台灣時間 16:10 (最後保險)
    - cron: '10 8 * * 1-5'
  workflow_dispatch: # 保留手動按鈕

permissions:
  contents: write         # 允許 Action 推播 data.json 回倉庫

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 消除 Node.js 20 棄用警告

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          # 💡 重要：將你設定的 Secrets 傳遞給 fetch.py 使用
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python fetch.py

      - name: Commit & push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "自動更新今日籌碼: $(date +'%Y-%m-%d')" || exit 0
          git push
