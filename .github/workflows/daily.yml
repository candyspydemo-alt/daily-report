name: Daily Stock Fetch

on:
  schedule:
    - cron: '30 7 * * 1-5'  # 台灣時間 15:30 (UTC 7:30)
  workflow_dispatch:

# 核心修正：加入此權限設定，解決 Git 推送時的 Exit Code 128 錯誤
permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4  # 升級至 v4 以支援 Node.js 24

      - name: Setup Python
        uses: actions/setup-python@v5  # 升級至 v5 以支援 Node.js 24
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python fetch.py

      - name: Commit & push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          # 如果檔案沒有變動，commit 會失敗，用 || exit 0 確保流程不會噴錯
          git commit -m "update data: $(date +'%Y-%m-%d')" || exit 0
          git push
