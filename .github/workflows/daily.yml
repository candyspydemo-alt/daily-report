name: Daily Stock Fetch

on:
  schedule:
    # 台灣時間 15:10 (嘗試第一次)
    - cron: '10 7 * * 1-5'
    # 台灣時間 15:40 (如果前一個還沒跑，這是一個補丁)
    - cron: '40 7 * * 1-5'
    # 台灣時間 16:10 (最後保險)
    - cron: '10 8 * * 1-5'
  workflow_dispatch: # ✅ 這裡原本縮排太進去了，已修復

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    # ⚠️ 建議先移除 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24，目前 GitHub 預設環境穩定
    # 若一定要加，縮排需與 runs-on 對齊

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python fetch.py

      - name: Commit & push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # ✅ commit 後面加上 || exit 0 是對的，防止沒資料更新時報錯
          git commit -m "自動更新今日籌碼: $(date +'%Y-%m-%d')" || exit 0
          git push
