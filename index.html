<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三大法人每日報告</title>
  <style>
    body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 600px; margin: auto; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .data-item { font-size: 1.2rem; margin: 10px 0; }
    .positive { color: #d20000; } /* 台股習慣：正數紅 */
    .negative { color: #008800; } /* 台股習慣：負數綠 */
    #date { color: #666; }
  </style>
</head>
<body>
  <h1>📊 三大法人買賣超日報</h1>

  <div id="date" class="data-item">讀取中...</div>
  <div id="foreign" class="data-item"></div>
  <div id="investment" class="data-item"></div>
  <div id="dealer" class="data-item"></div>
  <hr>
  <div id="total" class="data-item" style="font-weight: bold; font-size: 1.5rem;"></div>

  <script>
    // 加上 ?v= 時間戳記，強迫瀏覽器每次都抓最新 json，不讀舊快取
    fetch('data.json?v=' + new Date().getTime())
      .then(res => res.json())
      .then(data => {
// 把原本那行註解掉
// document.getElementById('date').innerText = "📅 報告日期：" + data.date;

// 強制顯示 4/17
document.getElementById('date').innerText = "📅 報告日期：2026-04-17 (測試中)";
        document.getElementById('foreign').innerHTML = `外資：<span class="${data.foreign >= 0 ? 'positive' : 'negative'}">${data.foreign} 億</span>`;
        document.getElementById('investment').innerHTML = `投信：<span class="${data.investment >= 0 ? 'positive' : 'negative'}">${data.investment} 億</span>`;
        document.getElementById('dealer').innerHTML = `自營商：<span class="${data.dealer >= 0 ? 'positive' : 'negative'}">${data.dealer} 億</span>`;
        
        const totalVal = data.total;
        document.getElementById('total').innerHTML = `總計：<span class="${totalVal >= 0 ? 'positive' : 'negative'}">${totalVal} 億</span>`;
      })
      .catch(err => {
        document.getElementById('date').innerText = "⚠️ 今日資料尚未更新或讀取失敗";
        console.error(err);
      });
  </script>
</body>
</html>
