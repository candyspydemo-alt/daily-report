<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>三大法人每日報告</title>
</head>
<body>
  <h1>📊 三大法人每日報告</h1>

  <p id="date"></p>
  <p id="foreign"></p>
  <p id="investment"></p>
  <p id="dealer"></p>
  <p id="total"></p>

  <script>
    fetch('data.json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('date').innerText = "日期：" + data.date;
        document.getElementById('foreign').innerText = "外資：" + data.foreign + " 億";
        document.getElementById('investment').innerText = "投信：" + data.investment + " 億";
        document.getElementById('dealer').innerText = "自營商：" + data.dealer + " 億";
        document.getElementById('total').innerText = "合計：" + data.total + " 億";
      });
  </script>
</body>
</html>
